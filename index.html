<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Nyxora — Movies, Reels & Apps. One platform.">
    <meta name="robots" content="index, follow">
    <title>Nyxora</title>

    <!-- Preload critical assets -->
    <link rel="preload" href="style/main.css" as="style">
    <link rel="preload" href="js/router.js" as="script">
    <link rel="preload" href="js/sync-engine.js" as="script">
    <link rel="preload" href="js/security.js" as="script">
    <link rel="preload" href="js/user-db.js" as="script">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="style/main.css">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⏯</text></svg>">
</head>
<body>

    <!-- ===== STICKY HEADER ===== -->
    <header id="app-header" class="sticky-header">
        <div class="header-inner">
            <!-- Logo (doubles as hidden trigger on 5th click) -->
            <div id="secret-trigger" class="logo" tabindex="0" role="button" aria-label="Nyxora Home">
                <span class="logo-icon">⏯</span>
                <span class="logo-text">Nyxora</span>
            </div>
            <!-- Search Bar -->
            <div class="search-container">
                <input type="text" id="global-search" class="search-input"
                       placeholder="Search movies, reels, apps..."
                       aria-label="Search Nyxora" autocomplete="off">
                <button class="search-btn" aria-label="Search">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.5">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- ===== MAIN CONTENT AREA ===== -->
    <main id="app-main" class="main-content">

        <!-- View: Home -->
        <section id="view-home" class="view active-view">
            <div class="view-header">
                <h1 class="section-title">Discover</h1>
            </div>
            <div class="content-grid" id="home-feed">
                <!-- Dynamically populated by sync-engine.js / placeholder data -->
                <div class="placeholder-card">
                    <div class="card-skeleton"></div>
                    <p class="card-label">Trending Movies</p>
                </div>
                <div class="placeholder-card">
                    <div class="card-skeleton"></div>
                    <p class="card-label">Popular Reels</p>
                </div>
                <div class="placeholder-card">
                    <div class="card-skeleton"></div>
                    <p class="card-label">New Apps</p>
                </div>
            </div>
        </section>

        <!-- View: Movies -->
        <section id="view-movies" class="view">
            <div class="view-header">
                <h1 class="section-title">Movies</h1>
                <div class="view-filters">
                    <button class="filter-btn active" data-filter="trending">Trending</button>
                    <button class="filter-btn" data-filter="latest">Latest</button>
                    <button class="filter-btn" data-filter="rated">Top Rated</button>
                </div>
            </div>
            <div class="content-grid" id="movies-grid">
                <!-- Injected by sync-engine.js -->
            </div>
        </section>

        <!-- View: Reels (Short Videos) -->
        <section id="view-reels" class="view">
            <div class="view-header">
                <h1 class="section-title">Reels</h1>
            </div>
            <div class="reels-container" id="reels-player">
                <!-- Injected by sync-engine.js — YouTube IFrame playlist -->
            </div>
        </section>

        <!-- View: Apps (APK Repository) -->
        <section id="view-apps" class="view">
            <div class="view-header">
                <h1 class="section-title">Apps</h1>
            </div>
            <div class="content-grid" id="apps-grid">
                <!-- Injected by sync-engine.js — F-Droid / APK listings -->
            </div>
        </section>

        <!-- ===== SECRET VIEW (Hidden Portal / Easter Egg) ===== -->
        <section id="view-secret" class="view secret-view" aria-hidden="true">
            <div class="view-header">
                <h1 class="section-title glitch-text">⌘ ACCESS TERMINAL ⌘</h1>
            </div>
            <div id="secret-portal" class="secret-portal">
                <div class="portal-overlay"></div>
                <div class="portal-content">
                    <p class="portal-tagline">// nyxora://hidden.chamber</p>
                    <div id="portal-terminal" class="portal-terminal">
                        <div class="terminal-line">> Initializing hidden gateway...</div>
                        <div class="terminal-line">> Access granted.</div>
                        <div class="terminal-line blink-cursor">> _</div>
                    </div>
                    <div class="portal-actions" id="portal-actions">
                        <!-- Hidden features will be mounted here -->
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- ===== BOTTOM NAVIGATION ===== -->
    <nav id="bottom-nav" class="bottom-nav" role="navigation" aria-label="Main Navigation">
        <a href="#home" class="nav-item active" data-route="home" aria-label="Home">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span class="nav-label">Home</span>
        </a>
        <a href="#movies" class="nav-item" data-route="movies" aria-label="Movies">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="2" width="20" height="20" rx="2.18"/>
                <line x1="7" y1="2" x2="7" y2="22"/>
                <line x1="17" y1="2" x2="17" y2="22"/>
                <line x1="2" y1="12" x2="22" y2="12"/>
                <line x1="2" y1="7" x2="7" y2="7"/>
                <line x1="17" y1="7" x2="22" y2="7"/>
                <line x1="2" y1="17" x2="7" y2="17"/>
                <line x1="17" y1="17" x2="22" y2="17"/>
            </svg>
            <span class="nav-label">Movies</span>
        </a>
        <a href="#reels" class="nav-item" data-route="reels" aria-label="Reels">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="23 7 16 12 23 17 23 7"/>
                <rect x="1" y="5" width="15" height="14" rx="2"/>
            </svg>
            <span class="nav-label">Reels</span>
        </a>
        <a href="#apps" class="nav-item" data-route="apps" aria-label="Apps">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <line x1="3" y1="9" x2="21" y2="9"/>
                <line x1="9" y1="3" x2="9" y2="21"/>
            </svg>
            <span class="nav-label">Apps</span>
        </a>
    </nav>

    <!-- ===== SCRIPTS (load order matters) ===== -->
    <script src="js/user-db.js"></script>
    <script src="js/security.js"></script>
    <script src="js/sync-engine.js"></script>
    <script src="js/router.js"></script>
</body>
</html>
